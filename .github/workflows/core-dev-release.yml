name: SinceDungeon Core Releases

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sincedungeon-core-release-${{ github.ref }}
  cancel-in-progress: false

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

jobs:
  build_release:
    name: Build & Publish Core Releases
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Build Core Plugin
        run: |
          chmod +x ./gradlew
          ./gradlew clean :Core:shadowJar

      - name: Prepare Release Metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          VERSION=$(./gradlew :Core:properties -q | awk -F': ' '/^version:/ { print $2; exit }')
          if [ -z "$VERSION" ]; then
            echo "Core Gradle project version could not be detected." >&2
            exit 1
          fi

          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION_TAG="v${VERSION}"
          DEV_TAG="latest-devbuild"

          JAR_FILE=$(find build/libs -maxdepth 1 -type f -name "SinceDungeon-*.jar" ! -name "*-original.jar" ! -name "*PremiumAddon*" | sort | head -n 1)
          if [ -z "$JAR_FILE" ] || [ ! -f "$JAR_FILE" ]; then
            echo "No Core build jar found in build/libs." >&2
            exit 1
          fi

          mkdir -p dist
          RELEASE_JAR="dist/SinceDungeon-${VERSION}.jar"
          DEV_JAR="dist/SinceDungeon-latest-devbuild.jar"
          cp "$JAR_FILE" "$RELEASE_JAR"
          cp "$JAR_FILE" "$DEV_JAR"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "dev_tag=$DEV_TAG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "release_jar=$RELEASE_JAR" >> "$GITHUB_OUTPUT"
          echo "dev_jar=$DEV_JAR" >> "$GITHUB_OUTPUT"

      - name: Generate Changelogs
        id: changelog
        shell: bash
        run: |
          set -euo pipefail

          VERSION_TAG="${{ steps.meta.outputs.version_tag }}"
          VERSION="${{ steps.meta.outputs.version }}"

          PREVIOUS_VERSION_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+(\.[0-9]+)*([-+][A-Za-z0-9._-]+)?$' | grep -v "^${VERSION_TAG}$" | head -n 1 || true)
          if [ -n "$PREVIOUS_VERSION_TAG" ]; then
            RANGE="${PREVIOUS_VERSION_TAG}..HEAD"
            RANGE_TEXT="since ${PREVIOUS_VERSION_TAG}"
          else
            RANGE="HEAD"
            RANGE_TEXT="from repository history"
          fi

          {
            echo "## SinceDungeon Core ${VERSION}"
            echo
            echo "Built from commit \`${GITHUB_SHA}\`."
            echo
            echo "### Changes ${RANGE_TEXT}"
            git log "$RANGE" --pretty=format:'- %s (%h)' --no-merges -- . ':!Premium/**' || true
          } > version_changelog.md

          if ! grep -q '^- ' version_changelog.md; then
            echo "- No Core commit changelog was available for this build." >> version_changelog.md
          fi

          {
            echo "## Latest SinceDungeon Core Dev Build"
            echo
            echo "- Version: \`${VERSION}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Branch: \`${GITHUB_REF_NAME}\`"
            echo "- Build: [#${GITHUB_RUN_NUMBER}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
            echo
            echo "### Recent Core Changes"
            git log -20 --pretty=format:'- %s (%h)' --no-merges -- . ':!Premium/**' || true
          } > devbuild_changelog.md

          if ! grep -q '^- ' devbuild_changelog.md; then
            echo "- No Core commit changelog was available for this build." >> devbuild_changelog.md
          fi

          echo "version_body=version_changelog.md" >> "$GITHUB_OUTPUT"
          echo "dev_body=devbuild_changelog.md" >> "$GITHUB_OUTPUT"

      - name: Publish Latest Dev Build Release
        if: github.ref_name == github.event.repository.default_branch
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          DEV_TAG="${{ steps.meta.outputs.dev_tag }}"
          DEV_JAR="${{ steps.meta.outputs.dev_jar }}"
          DEV_BODY="${{ steps.changelog.outputs.dev_body }}"

          git tag -f "$DEV_TAG" "$GITHUB_SHA"
          git push -f origin "refs/tags/${DEV_TAG}"

          if gh release view "$DEV_TAG" >/dev/null 2>&1; then
            gh release edit "$DEV_TAG" \
              --title "Latest SinceDungeon Core Dev Build" \
              --notes-file "$DEV_BODY" \
              --latest
          else
            gh release create "$DEV_TAG" \
              --title "Latest SinceDungeon Core Dev Build" \
              --notes-file "$DEV_BODY" \
              --latest
          fi

          gh release upload "$DEV_TAG" "$DEV_JAR" --clobber

      - name: Publish Version Release
        if: github.ref_name == github.event.repository.default_branch
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          VERSION_TAG="${{ steps.meta.outputs.version_tag }}"
          RELEASE_JAR="${{ steps.meta.outputs.release_jar }}"
          VERSION_BODY="${{ steps.changelog.outputs.version_body }}"

          git tag -f "$VERSION_TAG" "$GITHUB_SHA"
          git push -f origin "refs/tags/${VERSION_TAG}"

          if gh release view "$VERSION_TAG" >/dev/null 2>&1; then
            gh release edit "$VERSION_TAG" \
              --title "SinceDungeon Core ${{ steps.meta.outputs.version }}" \
              --notes-file "$VERSION_BODY" \
              --prerelease \
              --latest=false
          else
            gh release create "$VERSION_TAG" \
              --title "SinceDungeon Core ${{ steps.meta.outputs.version }}" \
              --notes-file "$VERSION_BODY" \
              --prerelease \
              --latest=false
          fi

          gh release upload "$VERSION_TAG" "$RELEASE_JAR" --clobber

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SinceDungeon-Core-${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_sha }}
          path: dist/*.jar
          retention-days: 14
