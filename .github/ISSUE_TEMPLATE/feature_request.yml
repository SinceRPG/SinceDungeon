# ==============================================================================
# Minecraft Plugin Feature Request Form
# Description: Collects detailed proposals for new plugin features, including
#              potential configuration (config.yml) structural examples.
# ==============================================================================

name: Feature Request
description: Suggest an idea, new command, or enhancement for the plugin.
title: "[FEATURE] <Short description of the requested feature>"
labels: ["enhancement", "pending-review"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ### 💡 Feature Request
        Have an idea to make the plugin better? Please fill out the details below.

  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem or a missing capability on your server?
      placeholder: As a server admin, I am always frustrated when I cannot...
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution / Feature
      description: Describe how the new feature should work in-game (commands, permissions, mechanics).
      placeholder: I would like a command /... that does...
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any other context, mechanics from other plugins, or screenshots here.
    validations:
      required: false