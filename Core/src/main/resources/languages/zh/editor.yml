      edit_action_base_health:
        - "&7输入 Boss 的基础生命值。"
        - "&7示例: &a500.0"
      edit_action_scale_health_per_player:
        - "&7输入每增加一名玩家时增加的额外生命值。"
        - "&7示例: &a150.0"
      edit_action_bar_color:
        - "&7输入 Boss 血条 (BossBar) 的颜色。"
        - "&7有效值: BLUE, GREEN, PINK, PURPLE, RED, WHITE, YELLOW"
        - "&7示例: &aRED"
      edit_action_bar_style:
        - "&7输入 Boss 血条 (BossBar) 的样式。"
        - "&7有效值: SOLID, SEGMENTED_6, SEGMENTED_10, SEGMENTED_12, SEGMENTED_20"
        - "&7示例: &aSOLID"
      edit_action_target_to_kill:
        - "&7输入完成此波所需击杀的最终怪物的内部名称 (internal name)。"
        - "&7用于具有多个阶段的 Boss (例如：从盔甲架变成凋灵)。"
        - "&7示例: &atoro_wither_terror"
        - "&7提示: 如果最初生成的怪物就是唯一目标，请键入 &cNONE &7。"
      edit_req_item:
        - "&7输入进入所需物品的格式。"
        - "&7原版: &aDIAMOND:5"
        - "&7MMOItems: &aMMOITEMS:SWORD:FIERY:1"
        - "&7副本钥匙: &aKEY:door_1:1"
        - "&7提示: 输入 &cNONE &7禁用此要求。"
      edit_action_radius:
        - "&7输入圆环/区域的半径。"
        - "&7示例: &a3.0"
      edit_action_location:
        - "&7输入坐标格式: &fX,Y,Z"
        - "&7提示: 输入 &ahere &7使用你当前的位置。"
      edit_action_sound:
        - "&7输入你想要播放的声音音效。"
        - "&7示例: &aentity.enderman.teleport"
      edit_insert_stage:
        - "&7输入你想要插入的阶段位置。"
        - "&7示例: &a2 &7(将阶段 2 移到 3，使 2 变为空白)"
      edit_action_per_player:
        - "&7每个玩家都应该获得自己的独立战利品吗？"
        - "&7输入 &atrue &7或 &cfalse&7。"
      edit_reward_value_life_item:
        - "&7输入要给予的生命值物品数量。"
        - "&7格式: &a<Amount>"
        - "&7示例: &f1"
        - "&7提示: 手持该物品右键点击按钮可自动填充！"
      edit_reward_value_cooldown_reset:
        - "&7输入要给予的冷却重置券数量。"
        - "&7格式: &a<Amount>"
        - "&7示例: &f1"
        - "&7提示: 手持该物品右键点击按钮可自动填充！"
      edit_reward_value_cooldown_reduce:
        - "&7输入要减少的秒数和物品数量。"
        - "&7格式: &a<Seconds>:<Amount>"
        - "&7示例: &f60:1 &7(减少 60 秒，给予 1 张票券)"
        - "&7提示: 手持该物品右键点击按钮可自动填充！"
      edit_custom_drops:
        - "&7输入掉落物品和概率。"
        - "&7格式: &a<ItemData>;<Chance>"
        - "&7--- 示例 ---"
        - "&7原版物品: &fDIAMOND:1;50.0"
        - "&7MMOItems: &fMMOITEMS:SWORD:FIERY:1;25.5"
        - "&7副本钥匙: &fKEY:door_1:1;10.0"
        - "&7生命物品: &fLIFE_ITEM:1;5.0"
        - "&7CD重置: &fCOOLDOWN_RESET:1;1.0"
        - "&7CD减少: &fCOOLDOWN_REDUCE:60:1;10.0"
        - "&7提示: 输入 &cclear &7清空列表。"
      edit_phase_threshold:
        - "&7输入生命值百分比阈值 (1-100) 以触发此阶段。"
        - "&7示例: &a50 &7(在 50% HP 时触发)"
      edit_reinforcement_mob:
        - "&7输入增援怪物的原版实体类型 (EntityType)。"
        - "&7示例: &aSKELETON"
      edit_reinforcement_amount:
        - "&7输入要生成的增援数量。"
        - "&7示例: &a4"
      edit_reinforcement_name:
        - "&7为增援输入自定义名称 (支持颜色代码)。"
        - "&7示例: &c皇家守卫"
        - "&7提示: 输入 &cclear &7移除名称。"
      edit_action_enrage_time:
        - "&7输入 Boss 狂暴前的时间 (秒)。"
        - "&7输入 &c-1 &7禁用狂暴计时器。"
        - "&7示例: &a120 &7(2分钟后狂暴)"
      edit_action_enrage_message:
        - "&7输入当 Boss 狂暴时广播的消息。"
        - "&7示例: &c&lBoss 已经进入 狂暴 状态！"
        - "&7提示: 输入 &cclear &7禁用此消息。"
      edit_action_enrage_attributes:
        - "&7设置狂暴时应用的额外属性。"
        - "&7格式: &a<attribute>:<value>"
        - "&7示例: &fattack_damage:50"
        - "&7提示: 输入 &cclear &7清空列表。"
      edit_cooldown:
        - "&7输入冷却时间 (秒)。"
        - "&7示例: &a1800 &7(表示30分钟)"
      edit_commands:
        - "&7输入命令 (不要带斜杠 /)。"
        - "&7变量支持: &a%player%, %dungeon%, %stage%"
        - "&7条件格式: &e[condition] command"
        - "&7示例: &a[%vault_eco_balance%;>=;500] eco give %player% 100"
        - "&7提示: 输入 &cclear &7清空列表。"
      edit_action_mob_level:
        - "&7输入 MythicMob 的等级 (默认: 1)。"
        - "&7示例: &a5"
      edit_max_players:
        - "&7输入此副本允许的最大玩家数量。"
        - "&7输入 &c-1 &7或 &c0 &7表示无限制/仅受队伍人数限制。"
        - "&7示例: &a6"
      edit_action_key_id:
        - "&7输入此钥匙/门的唯一 ID。"
        - "&7示例: &adoor_1"
      edit_stage_chance:
        - "&7输入此阶段的生成概率 (0-100)。"
        - "&7示例: &a50.5"
      edit_action_time_limit:
        - "&7输入此动作的时间限制 (秒)。"
        - "&7输入 &c-1 &7禁用时间限制。"
        - "&7示例: &a60"
      edit_action_time_penalty:
        - "&7输入达到时间限制时扣除的生命数。"
        - "&7示例: &a1"
      edit_action_scale_with_party:
        - "&7这个阶段应该将生成数量乘以队伍大小吗？"
        - "&7输入 &atrue &7或 &cfalse&7。"
      edit_req_lives:
        - "&7输入进入此副本所需的最小生命数。"
        - "&7示例: &a1"
      edit_deduct_lives:
        - "&7输入玩家在此副本死亡时失去的生命数。"
        - "&7示例: &a1"
      create_filename:
        - "&7为新副本输入一个名称。"
        - "&7允许字符: &f字母 (a-z), 数字 (0-9), 连字符/下划线。"
        - "&7示例: &adungeon_map_1"
      edit_world_name:
        - "&7输入作为模板的世界文件夹名称。"
        - "&7示例: &aDungeon_Map_01"
      edit_condition_check:
        - "&7输入 PAPI 条件格式: &f%placeholder%;operator;value"
        - "&7支持的运算符: &f>=, <=, >, <, ==, !="
