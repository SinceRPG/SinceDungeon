  input:
    title_main: "&6&lINPUT MODE"
    title_sub: "&fCheck the chat for instructions!"
    header: "&e=== INPUT MODE ==="
    footer: "&e====================="
    right_click_hint: "&bor RIGHT-CLICK on any Block to get its coordinates."
    cancel_hint: "&7Type &ccancel &7to abort."
    prompts:
      edit_action_per_player:
        - "&7Should each player get their own instanced loot?"
        - "&7Enter &atrue &7or &cfalse&7."
      edit_reward_value_life_item:
        - "&7Enter the amount of Life items to give."
        - "&7Format: &a<Amount>"
        - "&7Example: &f1"
        - "&7Tip: Right-click with the item in hand to auto-fill!"
      edit_reward_value_cooldown_reset:
        - "&7Enter the amount of Cooldown Reset Tickets to give."
        - "&7Format: &a<Amount>"
        - "&7Example: &f1"
        - "&7Tip: Right-click with the item in hand to auto-fill!"
      edit_reward_value_cooldown_reduce:
        - "&7Enter the seconds to reduce and the amount of tickets."
        - "&7Format: &a<Seconds>:<Amount>"
        - "&7Example: &f60:1 &7(Reduces 60s, gives 1 ticket)"
        - "&7Tip: Right-click with the item in hand to auto-fill!"
      edit_custom_drops:
        - "&7Enter the drop item and chance."
        - "&7Format: &a<ItemData>;<Chance>"
        - "&7--- EXAMPLES ---"
        - "&7Vanilla: &fDIAMOND:1;50.0"
        - "&7MMOItems: &fMMOITEMS:SWORD:FIERY:1;25.5"
        - "&7Dungeon Key: &fKEY:door_1:1;10.0"
        - "&7Life Item: &fLIFE_ITEM:1;5.0"
        - "&7CD Reset: &fCOOLDOWN_RESET:1;1.0"
        - "&7CD Reduce: &fCOOLDOWN_REDUCE:60:1;10.0"
        - "&7Tip: Type &cclear &7to empty the list."
      edit_phase_threshold:
        - "&7Enter the health percentage threshold (1-100) to trigger this phase."
        - "&7Example: &a50 &7(Triggers at 50% HP)"
      edit_reinforcement_mob:
        - "&7Enter the Vanilla EntityType for reinforcements."
        - "&7Example: &aSKELETON"
      edit_reinforcement_amount:
        - "&7Enter the amount of reinforcements to spawn."
        - "&7Example: &a4"
      edit_reinforcement_name:
        - "&7Enter a custom name for the reinforcements (Color codes supported)."
        - "&7Example: &cRoyal Guard"
        - "&7Tip: Type &cclear &7to remove the name."
      edit_action_enrage_time:
        - "&7Enter the time (in seconds) before the boss enrages."
        - "&7Enter &c-1 &7to disable the enrage timer."
        - "&7Example: &a120 &7(Enrages after 2 minutes)"
      edit_action_enrage_message:
        - "&7Enter the message broadcasted when the boss enrages."
        - "&7Example: &c&lThe Boss has become ENRAGED!"
        - "&7Tip: Type &cclear &7to disable the message."
      edit_action_enrage_attributes:
        - "&7Set the bonus attributes applied when enraged."
        - "&7Format: &a<attribute>:<value>"
        - "&7Example: &fattack_damage:50"
        - "&7Tip: Type &cclear &7to empty the list."
      edit_cooldown:
        - "&7Enter the cooldown time in seconds."
        - "&7Example: &a1800 &7(for 30 minutes)"
      edit_commands:
        - "&7Enter the command (without slash /)."
        - "&7Variables: &a%player%, %dungeon%, %stage%"
        - "&7Condition format: &e[condition] command"
        - "&7Example: &a[%vault_eco_balance%;>=;500] eco give %player% 100"
        - "&7Tip: Type &cclear &7to empty the list."
      edit_action_mob_level:
        - "&7Enter the level for the MythicMob (Default: 1)."
        - "&7Example: &a5"
      edit_max_players:
        - "&7Enter the maximum number of players allowed in this dungeon."
        - "&7Enter &c-1 &7or &c0 &7for unlimited/global party limit."
        - "&7Example: &a6"
      edit_action_key_id:
        - "&7Enter the unique ID for this key/door."
        - "&7Example: &adoor_1"
      edit_stage_chance:
        - "&7Enter the spawn chance for this stage (0-100)."
        - "&7Example: &a50.5"
      edit_action_time_limit:
        - "&7Enter the time limit in seconds for this action."
        - "&7Enter &c-1 &7to disable time limit."
        - "&7Example: &a60"
      edit_action_time_penalty:
        - "&7Enter the amount of lives lost if the time limit is reached."
        - "&7Example: &a1"
      edit_action_scale_with_party:
        - "&7Should this stage multiply the spawn amount by the party size?"
        - "&7Enter &atrue &7or &cfalse&7."
      edit_req_lives:
        - "&7Enter the minimum amount of lives required to enter this Dungeon."
        - "&7Example: &a1"
      edit_deduct_lives:
        - "&7Enter the amount of lives lost when a player dies in this Dungeon."
        - "&7Example: &a1"
      create_filename:
        - "&7Enter a name for the new Dungeon."
        - "&7Allowed: &fLetters (a-z), Numbers (0-9), dash/underscore."
        - "&7Example: &adungeon_map_1"
      edit_world_name:
        - "&7Enter the template World folder name."
        - "&7Example: &aDungeon_Map_01"
      edit_condition_check:
        - "&7Enter PAPI condition format: &f%placeholder%;operator;value"
        - "&7Supported operators: &f>=, <=, >, <, ==, !="
        - "&7Example: &a%vault_eco_balance%;>=;500"
      edit_condition_msg:
        - "&7Enter the message shown when requirement is not met."
        - "&7Example: &cYou need $500 to enter!"
      edit_reward_value_item:
        - "&7Enter item format: &aMATERIAL:AMOUNT &7or &aMATERIAL:MIN-MAX"
        - "&7Example: &fDIAMOND:5 &7or &fEMERALD:1-3"
      edit_reward_value_mmoitem:
        - "&7Enter MMOItems format: &aTYPE:ID:AMOUNT &7or &aTYPE:ID:MIN-MAX"
        - "&7Example: &fSWORD:FIERY_SWORD:1-5"
      edit_reward_value_command:
        - "&7Enter the command to run (Use &a%player% &7for player name)."
        - "&7Example: &feco give %player% 1000"
      edit_reward_chance:
        - "&7Enter the drop percentage for this reward (0-100)."
        - "&7Example: &f50.5"
      edit_reward_name:
        - "&7Enter the display name or reward message."
        - "&7Colors supported. Example: &a&lSuper Sword"
      edit_tier:
        - "&7Enter Time (seconds) and Chest amount, separated by a space."
        - "&7Example: &a300 3 &7(Complete under 300s = 3 chests)"
      edit_kick_delay:
        - "&7Enter the Delay in Seconds before kicking players out upon win."
        - "&7Example: &a15"
      edit_action_mob:
        - "&7Enter the monster name (MythicMobs Internal Name or Vanilla EntityType)."
        - "&7MythicMobs Example: &aSkeletonKing"
        - "&7Vanilla Example: &aZOMBIE"
      edit_action_amount:
        - "&7Enter the amount of mobs to spawn."
        - "&7Example: &a10"
      edit_action_start_message:
        - "&7Enter the start message for this action (colors supported)."
        - "&7Tip: Type &cclear &7to empty the message list."
      edit_action_items:
        - "&7--- LOOT CHEST CONFIGURATION ---"
        - "&7To add a Key that opens a door, edit the YAML file directly."
        - "&7Dungeon Key Syntax: &aKEY:<key_id>:<amount>"
        - "&7Example: &fKEY:door_1:1 &8(Drops a key for door_1)"
        - "&7Vanilla Item: &aMATERIAL:AMOUNT"
        - "&7MMOItems: &aMMOITEMS:TYPE:ID:AMOUNT"
        - "&7Tip: Close the chest GUI to save your normal items."
      edit_location:
        - "&7Enter coordinates format: &fX,Y,Z"
        - "&7Tip: Type &ahere &7to use your current location."
      edit_location_list:
        - "&7Enter coordinates &fX,Y,Z &7to add to the list."
        - "&7Tip: Type &ahere &7to use your current location."
        - "&7Tip: Type &cclear &7to empty the list."
      edit_number:
        - "&7Please enter a &anumber&7."
      edit_boolean:
        - "&7Please enter &atrue &7or &cfalse&7."
      edit_list:
        - "&7Enter text/value to add to the list."
        - "&7Tip: Type &cclear &7to empty this list."
      edit_random_mobs:
        - "&7Enter a mob entry to add to the random pool."
        - "&7--- FORMAT ---"
        - "&7Vanilla: &fVANILLA:<EntityType>:<weight>"
        - "&7Example: &aVANILLA:ZOMBIE:50"
        - "&7Mythic:  &fMYTHIC:<MobId>:<weight>[:<level>]"
        - "&7Example: &aMYTHIC:SkeletonKing:20:2"
        - "&7Weight: Higher = more likely to spawn. Does not need to sum to 100."
        - "&7Tip: Type &cclear &7to empty the pool."
      edit_string:
        - "&7Please enter the text or new config value."
      default:
        - "&7Please enter the new value in chat."
      edit_action_custom_name:
        - "&7Enter a custom name for the mob (Color codes supported)."
        - "&7Example: &c&lFire Boss"
        - "&7Tip: Type &cclear &7to remove the name."
      edit_action_is_baby:
        - "&7Is this mob a baby? Enter &atrue &7or &cfalse&7."
      edit_action_attributes:
        - "&7Set custom attributes for the monster."
        - "&7Format: &a<attribute>:<value>"
        - "&7Example: &fmax_health:500"
        - "&7Example: &fattack_damage:20"
        - "&7Example: &fscale:2.5"
        - "&7Tip: Type &cclear &7to remove all custom attributes."
        - "&7Link Attributes: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/attribute/Attribute.html"
      edit_action_equipment:
        - "&7Set the equipment for the monster."
        - "&7Format: &a<slot>:<item_data>"
        - "&7Valid Slots: &fhelmet, chestplate, leggings, boots, mainhand, offhand"
        - "&7Vanilla Example: &fmainhand:DIAMOND_SWORD:1"
        - "&7MMOItems Example: &fmainhand:MMOITEMS:SWORD:FIERY_SWORD:1"
        - "&7Tip: Type &cclear &7to remove all equipment."
      edit_action_start_radius:
        - "&7Enter the initial radius of the zone."
        - "&7Example: &a10.0"
      edit_action_end_radius:
        - "&7Enter the final radius of the zone (if < start_radius, it shrinks)."
        - "&7Example: &a3.0"
      edit_action_required_time:
        - "&7Enter the time in seconds players must hold the zone."
        - "&7Example: &a20"
      edit_action_mob_type:
        - "&7Enter the EntityType of the mob to spawn (or NONE to disable)."
        - "&7Example: &aZOMBIE"
      edit_action_mob_interval:
        - "&7Enter the interval in ticks to spawn a mob (20 ticks = 1s)."
        - "&7Example: &a60"
      edit_action_key_item:
        - "&7Enter the required Key Item format."
        - "&7Vanilla Example: &aTRIPWIRE_HOOK:1"
        - "&7MMOItems Example: &aMMOITEMS:KEY:DUNGEON_KEY:1"
