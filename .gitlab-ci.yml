image: gradle:9-jdk21

variables:
  # Base Webhook URLs (NO ?thread_id AT THE END)
  WEBHOOK_URL_FREE: "https://discord.com/api/webhooks/1471469221614583810/pfMtLyRbTDKiUGMJyVBjhhJ3RDgQelOX71iMGqWg3HdrlokqBJSt1Ox3aC4yTkkGtZ-_"
  THREAD_ID_FREE: "1475129559530864852"

  WEBHOOK_URL_PREMIUM: "https://discord.com/api/webhooks/1500473462723051643/kFv5yPMXscfXOMyt_u8pB3XyhGYCmshPMCSaiu2AFkMb0DpibTrKti1j4RxshzTDeWnX"
  THREAD_ID_PREMIUM: "1500473399594451044"

  # Gradle Settings
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

  # Bot Identity & Assets
  ICON_URL: "https://gitlab.com/uploads/-/system/group/avatar/121690756/SinceRPG.png?width=48"
  THUMBNAIL_URL: "https://gitlab.com/uploads/-/system/group/avatar/121690756/SinceRPG.png?width=48"
  BOT_NAME_CORE: "SinceDungeon Build"
  BOT_NAME_PREM: "SinceDungeon Premium"

  # Embed Colors (Decimal format)
  COLOR_PENDING_CORE: "16766720"  # Yellow
  COLOR_PENDING_PREM: "16753920"  # Orange
  COLOR_SUCCESS: "5763719"        # Green
  COLOR_FAIL: "15548997"          # Red

  # Default Texts
  NO_CHANGELOG_TEXT: "No specific changelog provided."
  FAIL_DESC_TEXT: "A syntax or compilation error occurred. Please check the GitLab Pipeline Console."

stages:
  - notify_start
  - build
  - notify_result

# --- STAGE 1: NOTIFY BUILD START (SENDS THE "WAITING" MESSAGE) ---
notify_start:
  stage: notify_start
  before_script:
    - apt-get update && apt-get install -y git jq curl
  script:
    - COMMIT_MSG=$(git log -1 --pretty=%B)
    - AUTHOR=$(git log -1 --pretty=%an)
    - HASH=$(git log -1 --pretty=%h)
    - TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

    # Extract versions gracefully
    - CORE_VER=$(gradle :Core:properties -q | grep "^version:" | awk '{print $2}' || echo "Unknown")
    - PREM_VER=$(gradle :Premium:properties -q | grep "^version:" | awk '{print $2}' || echo "Unknown")

    # Initialize the artifact file to store Message IDs
    - touch build.env

    - |
      # 1. CREATE PENDING MESSAGE FOR CORE
      if echo "$COMMIT_MSG" | grep -q "Core:"; then
        CORE_CHANGELOG=$(echo "$COMMIT_MSG" | awk '/^Core:/{f=1; next} /^Premium:/{f=0} f')
        [ -z "$(echo "$CORE_CHANGELOG" | tr -d '[:space:]')" ] && CORE_CHANGELOG="$NO_CHANGELOG_TEXT"
      
        jq -n \
          --arg author "$AUTHOR triggered a build for SinceDungeon" \
          --arg desc "$CORE_CHANGELOG" \
          --arg footer "Core v$CORE_VER • $HASH" \
          --arg timestamp "$TIMESTAMP" \
          --arg icon "$ICON_URL" \
          --arg thumb "$THUMBNAIL_URL" \
          --arg bot_name "$BOT_NAME_CORE" \
          --argjson color "$COLOR_PENDING_CORE" \
          '{
            username: $bot_name,
            avatar_url: $icon,
            embeds: [{
              color: $color,
              author: { name: $author, icon_url: $icon },
              title: "⏳ Building Core version...",
              description: $desc,
              thumbnail: { url: $thumb },
              footer: { text: $footer },
              timestamp: $timestamp
            }]
          }' > core_start.json

        # Send message and extract ID, save to build.env for later stages
        RESPONSE=$(curl -s -X POST -H "Content-Type: application/json" -d @core_start.json "${WEBHOOK_URL_FREE}?thread_id=${THREAD_ID_FREE}&wait=true")
        MSG_ID=$(echo $RESPONSE | jq -r '.id')
        if [ "$MSG_ID" != "null" ]; then echo "CORE_MSG_ID=$MSG_ID" >> build.env; fi
      fi

    - |
      # 2. CREATE PENDING MESSAGE FOR PREMIUM
      if echo "$COMMIT_MSG" | grep -q "Premium:"; then
        PREMIUM_CHANGELOG=$(echo "$COMMIT_MSG" | awk '/^Premium:/{f=1; next} /^Core:/{f=0} f')
        [ -z "$(echo "$PREMIUM_CHANGELOG" | tr -d '[:space:]')" ] && PREMIUM_CHANGELOG="$NO_CHANGELOG_TEXT"
      
        jq -n \
          --arg author "$AUTHOR triggered a build for SinceDungeon Premium" \
          --arg desc "$PREMIUM_CHANGELOG" \
          --arg footer "Premium v$PREM_VER • $HASH" \
          --arg timestamp "$TIMESTAMP" \
          --arg icon "$ICON_URL" \
          --arg thumb "$THUMBNAIL_URL" \
          --arg bot_name "$BOT_NAME_PREM" \
          --argjson color "$COLOR_PENDING_PREM" \
          '{
            username: $bot_name,
            avatar_url: $icon,
            embeds: [{
              color: $color,
              author: { name: $author, icon_url: $icon },
              title: "⏳ Building Premium version...",
              description: $desc,
              thumbnail: { url: $thumb },
              footer: { text: $footer },
              timestamp: $timestamp
            }]
          }' > prem_start.json

        # Send message and extract ID, save to build.env for later stages
        RESPONSE=$(curl -s -X POST -H "Content-Type: application/json" -d @prem_start.json "${WEBHOOK_URL_PREMIUM}?thread_id=${THREAD_ID_PREMIUM}&wait=true")
        MSG_ID=$(echo $RESPONSE | jq -r '.id')
        if [ "$MSG_ID" != "null" ]; then echo "PREM_MSG_ID=$MSG_ID" >> build.env; fi
      fi

  artifacts:
    reports:
      dotenv: build.env

# --- STAGE 2: ACTUAL BUILD PROCESS ---
build_job:
  stage: build
  script:
    - gradle clean build
  artifacts:
    paths:
      - Core/build/libs/SinceDungeon-*.jar
      - Premium/build/libs/SinceDungeon-PremiumAddon-*.jar
    expire_in: never

# --- STAGE 3A: IF BUILD SUCCESSFUL (EDIT OLD MESSAGE & ATTACH FILE) ---
notify_success:
  stage: notify_result
  needs: [ "notify_start", "build_job" ]
  when: on_success
  before_script:
    - apt-get update && apt-get install -y git jq curl
  script:
    - COMMIT_MSG=$(git log -1 --pretty=%B)
    - AUTHOR=$(git log -1 --pretty=%an)
    - HASH=$(git log -1 --pretty=%h)
    - TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
    - CORE_VER=$(gradle :Core:properties -q | grep "^version:" | awk '{print $2}' || echo "Unknown")
    - PREM_VER=$(gradle :Premium:properties -q | grep "^version:" | awk '{print $2}' || echo "Unknown")

    - |
      # 1. EDIT CORE MESSAGE ON SUCCESS
      if [ -n "$CORE_MSG_ID" ]; then
        CORE_CHANGELOG=$(echo "$COMMIT_MSG" | awk '/^Core:/{f=1; next} /^Premium:/{f=0} f')
        [ -z "$(echo "$CORE_CHANGELOG" | tr -d '[:space:]')" ] && CORE_CHANGELOG="$NO_CHANGELOG_TEXT"
      
        jq -n \
          --arg author "$AUTHOR pushed an update for SinceDungeon" \
          --arg desc "$CORE_CHANGELOG" \
          --arg footer "Core v$CORE_VER • $HASH" \
          --arg timestamp "$TIMESTAMP" \
          --arg icon "$ICON_URL" \
          --arg thumb "$THUMBNAIL_URL" \
          --argjson color "$COLOR_SUCCESS" \
          '{
            embeds: [{
              color: $color,
              author: { name: $author, icon_url: $icon },
              title: "Build Successful! 🚀",
              description: $desc,
              thumbnail: { url: $thumb },
              footer: { text: $footer },
              timestamp: $timestamp
            }]
          }' > core_success.json

        # Locate the JAR artifact and PATCH the existing Discord message
        CORE_JAR=$(find Core/build/libs -name "SinceDungeon-*.jar" ! -name "*-original.jar" | head -n 1)
        if [ -f "$CORE_JAR" ]; then
          curl -X PATCH -F "payload_json=<core_success.json;type=application/json" -F "file=@$CORE_JAR" "${WEBHOOK_URL_FREE}/messages/${CORE_MSG_ID}?thread_id=${THREAD_ID_FREE}"
        else
          curl -X PATCH -H "Content-Type: application/json" -d @core_success.json "${WEBHOOK_URL_FREE}/messages/${CORE_MSG_ID}?thread_id=${THREAD_ID_FREE}"
        fi
      fi

    - |
      # 2. EDIT PREMIUM MESSAGE ON SUCCESS
      if [ -n "$PREM_MSG_ID" ]; then
        PREMIUM_CHANGELOG=$(echo "$COMMIT_MSG" | awk '/^Premium:/{f=1; next} /^Core:/{f=0} f')
        [ -z "$(echo "$PREMIUM_CHANGELOG" | tr -d '[:space:]')" ] && PREMIUM_CHANGELOG="$NO_CHANGELOG_TEXT"
      
        jq -n \
          --arg author "$AUTHOR pushed an update for SinceDungeon Premium" \
          --arg desc "$PREMIUM_CHANGELOG" \
          --arg footer "Premium v$PREM_VER • $HASH" \
          --arg timestamp "$TIMESTAMP" \
          --arg icon "$ICON_URL" \
          --arg thumb "$THUMBNAIL_URL" \
          --argjson color "$COLOR_SUCCESS" \
          '{
            embeds: [{
              color: $color,
              author: { name: $author, icon_url: $icon },
              title: "Premium Version Ready! 👑",
              description: $desc,
              thumbnail: { url: $thumb },
              footer: { text: $footer },
              timestamp: $timestamp
            }]
          }' > prem_success.json

        # Locate the JAR artifact and PATCH the existing Discord message
        PREMIUM_JAR=$(find Premium/build/libs -name "SinceDungeon-PremiumAddon-*.jar" ! -name "*-original.jar" | head -n 1)
        if [ -f "$PREMIUM_JAR" ]; then
          curl -X PATCH -F "payload_json=<prem_success.json;type=application/json" -F "file=@$PREMIUM_JAR" "${WEBHOOK_URL_PREMIUM}/messages/${PREM_MSG_ID}?thread_id=${THREAD_ID_PREMIUM}"
        else
          curl -X PATCH -H "Content-Type: application/json" -d @prem_success.json "${WEBHOOK_URL_PREMIUM}/messages/${PREM_MSG_ID}?thread_id=${THREAD_ID_PREMIUM}"
        fi
      fi

# --- STAGE 3B: IF BUILD FAILS (EDIT MESSAGE TO RED) ---
notify_failure:
  stage: notify_result
  needs: [ "notify_start", "build_job" ]
  when: on_failure
  before_script:
    - apt-get update && apt-get install -y git jq curl
  script:
    - COMMIT_MSG=$(git log -1 --pretty=%B)
    - HASH=$(git log -1 --pretty=%h)
    - TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
    - PIPELINE_URL="$CI_PIPELINE_URL"

    - |
      # 1. EDIT CORE MESSAGE ON FAILURE
      if [ -n "$CORE_MSG_ID" ]; then
        CORE_CHANGELOG=$(echo "$COMMIT_MSG" | awk '/^Core:/{f=1; next} /^Premium:/{f=0} f')
        [ -z "$(echo "$CORE_CHANGELOG" | tr -d '[:space:]')" ] && CORE_CHANGELOG="$FAIL_DESC_TEXT"
      
        jq -n \
          --arg url "$PIPELINE_URL" \
          --arg footer "Build Failed • $HASH" \
          --arg timestamp "$TIMESTAMP" \
          --arg icon "$ICON_URL" \
          --arg desc "$CORE_CHANGELOG" \
          --argjson color "$COLOR_FAIL" \
          '{ 
            embeds: [{ 
              color: $color, 
              author: { name: "Build Failed ❌", icon_url: $icon }, 
              title: "Click here to view Pipeline Logs", 
              url: $url, 
              description: $desc, 
              footer: { text: $footer }, 
              timestamp: $timestamp 
            }] 
          }' > core_fail.json
      
        curl -X PATCH -H "Content-Type: application/json" -d @core_fail.json "${WEBHOOK_URL_FREE}/messages/${CORE_MSG_ID}?thread_id=${THREAD_ID_FREE}"
      fi

    - |
      # 2. EDIT PREMIUM MESSAGE ON FAILURE
      if [ -n "$PREM_MSG_ID" ]; then
        PREMIUM_CHANGELOG=$(echo "$COMMIT_MSG" | awk '/^Premium:/{f=1; next} /^Core:/{f=0} f')
        [ -z "$(echo "$PREMIUM_CHANGELOG" | tr -d '[:space:]')" ] && PREMIUM_CHANGELOG="$FAIL_DESC_TEXT"
      
        jq -n \
          --arg url "$PIPELINE_URL" \
          --arg footer "Build Failed • $HASH" \
          --arg timestamp "$TIMESTAMP" \
          --arg icon "$ICON_URL" \
          --arg desc "$PREMIUM_CHANGELOG" \
          --argjson color "$COLOR_FAIL" \
          '{ 
            embeds: [{ 
              color: $color, 
              author: { name: "Build Failed ❌", icon_url: $icon }, 
              title: "Click here to view Pipeline Logs", 
              url: $url, 
              description: $desc, 
              footer: { text: $footer }, 
              timestamp: $timestamp 
            }] 
          }' > prem_fail.json
      
        curl -X PATCH -H "Content-Type: application/json" -d @prem_fail.json "${WEBHOOK_URL_PREMIUM}/messages/${PREM_MSG_ID}?thread_id=${THREAD_ID_PREMIUM}"
      fi