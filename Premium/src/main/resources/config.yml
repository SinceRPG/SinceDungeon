# =========================================================
# SINCE DUNGEON PREMIUM - MAIN CONFIGURATION
# =========================================================

# ---------------------------------------------------------
# [ADVANCED ACTIONS DEFAULTS]
# Configures the default values populated when an admin
# creates these tasks in the Editor GUI.
# ---------------------------------------------------------
action-defaults:
  apply_buff:
    time_limit: -1
    time_penalty: 1
    default-effect: "SPEED"
    default-duration: 200
    default-amplifier: 1

  escort:
    time_limit: -1
    time_penalty: 1
    default-mob: "VILLAGER"
    default-name: "&aVIP Escort"
    default-health: 100.0
    start_location: "0,64,0"
    target_location: "20,64,20"
    default-speed: 1.0
    default-radius: 4.0
    vip_is_baby: false
    vip_attributes: [ ]
    vip_equipment: [ ]
    attacker_mob: "ZOMBIE"
    attacker_amount: 3
    attacker_interval: 100
    attacker_name: "&cAssassin"
    attacker_is_baby: false
    attacker_attributes: [ ]
    attacker_equipment: [ ]

  branch:
    time_limit: -1
    time_penalty: 1
    path_a_loc: "0,64,0"
    path_b_loc: "10,64,10"
    stage_a: 3
    stage_b: 4
    radius: 3.0

  puzzle:
    time_limit: -1
    time_penalty: 1
    fail_time_penalty: 5
    levers:
      - "0,64,0"
      - "2,64,0"
      - "4,64,0"

  damage_zone:
    time_limit: -1
    time_penalty: 1
    center: "0,64,0"
    radius: 5.0
    damage: 4.0
    interval: 20
    duration: 200
    particle: "CAMPFIRE_COSY_SMOKE"

  checkpoint:
    time_limit: -1
    time_penalty: 1
    location: "0,64,0"
    radius: 3.0
    sound: "entity.player.levelup"
    particle: "TOTEM_OF_UNDYING"

  jump_stage:
    time_limit: -1
    time_penalty: 1
    target_stage: 5

  npc_interaction:
    time_limit: -1
    time_penalty: 1
    entity_type: "VILLAGER"
    custom_name: "&eDungeon Guide"
    npc_location: "0,64,0"
    target_location: "5,64,5"
    interaction_mode: "TALK"
    message_scope: "PLAYER"
    teleport_scope: "PLAYER"
    max_health: 40.0
    move_speed: 1.0
    success_radius: 2.5
    interaction_radius: 4.0
    start_on_click: true
    npc_is_baby: false
    consume_required_item: true
    fail_on_npc_death: true
    click_cooldown_ticks: 20
    dialogue_lines:
      - "&e[NPC] &fHello, <player>."
    required_item: "NONE"
    reward_item: "NONE"
    reward_display_name: ""
    npc_attributes: [ ]
    npc_equipment: [ ]

# ---------------------------------------------------------
# [MYTHIC+ AFFIXES]
# Attach affixes to specific Dungeon Template IDs.
# Available Affixes: VOLCANIC, VAMPIRIC
# ---------------------------------------------------------
affixes:
  example_dungeon:
    - "VOLCANIC"
    - "VAMPIRIC"

affixes-settings:
  volcanic:
    damage: 10.0
    radius: 3.0
    delay-ticks: 40 # 2 seconds before explosion
  vampiric:
    heal-percentage: 0.5 # Heals 50% of the damage dealt to players

# ---------------------------------------------------------
# [ADVANCED LOOT SYSTEMS]
# ---------------------------------------------------------
hologram-drops:
  enabled: true

roulette:
  enabled: true
  title: "&6&lReward Spin"
  gui-size: 27
  border-material: "BLACK_STAINED_GLASS_PANE"
  pointer-material: "HOPPER"
  top-pointer-slot: 4
  bottom-pointer-slot: 22
  spin-start-slot: 9
  spin-end-slot: 17
  reward-slot: 13
  next-spin-delay-ticks: 40
  animation:
    frames: 60
    slow-at-frame: 40
    slower-at-frame: 50
    slowest-at-frame: 55
    slow-delay-ticks: 2
    slower-delay-ticks: 4
    slowest-delay-ticks: 8

hologram-leaderboard:
  # Interval in seconds to pull data from DB and update displays
  update-interval-seconds: 300
  locations:
  # Note: Admins can use the internal API / command to set this up in-game now.

# ---------------------------------------------------------
# [DISCORD WEBHOOKS]
# Sends notifications to a Discord channel upon completion.
# ---------------------------------------------------------
webhooks:
  enabled: true
  url: "YOUR_DISCORD_WEBHOOK_URL_HERE"
  embed-title: "Dungeon Cleared!"
  embed-color: "5814783" # Decimal color code (Purple)
  embed-description: "Map: **%dungeon%**\nTime: **%time%s**\nPlayers: **%players%**"
  connect-timeout-ms: 5000
  read-timeout-ms: 5000

# ---------------------------------------------------------
# [EFFECTS & FEEDBACK]
# ---------------------------------------------------------
sounds:
  puzzle_success: "block.note_block.chime"
  puzzle_fail: "block.note_block.bass"
  roulette_tick: "block.note_block.hat"
  roulette_finish: "entity.player.levelup"
  npc_interact: "entity.villager.yes"
  npc_complete: "entity.player.levelup"
  npc_deny: "entity.villager.no"

particles:
  affix_vampiric: "HEART"
  affix_volcanic_warn: "FLAME"
  affix_volcanic_boom: "EXPLOSION"
  npc_spawn: "HAPPY_VILLAGER"
  npc_target: "END_ROD"

# ---------------------------------------------------------
# [DUNGEON INSTANCING ENGINE]
# WORLD = Clones complete world folders (Default Core Behavior).
# SCHEMATIC = Generates a Void World and uses FAWE to paste a .schem file.
# ---------------------------------------------------------
instancing:
  mode: "SCHEMATIC"
  # The Y-Level where the schematic will be pasted in the Void World
  paste-y-level: 64
  # Shared and dedicated schematic worlds use these defaults on Paper and Folia.
  world-settings:
    autosave: false
    time: 6000
    storm: false
    thundering: false
    unload-retries: 5
    unload-delay-ticks: 10
    unload-retry-delay-ticks: 100
    delete-delay-ticks: 40
  schematic:
    # When enabled, every dungeon run is pasted into an isolated region of this one world.
    # Actions still use the same YAML coordinates; Core offsets them into the assigned region.
    paste-air: true
    shared-world:
      # Folia cannot create or load worlds at runtime.
      # On Folia, this world must already be loaded by the server before the plugin enables.
      enabled: true
      name: "SDPremium_Schematic"
      spawn-location: "0,65,0"
      coordinate-y-offset: 0
      region-spacing: 2048
      region-radius: 512
      grid-width: 128
      clear-on-release: true
      clear-min-y: -64
      clear-max-y: 320
