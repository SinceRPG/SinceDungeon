        - "<gray>Enter MMOItems format: <green>TYPE:ID:AMOUNT"
        - "<gray>Example: <white>SWORD:FIERY_SWORD:1"
      edit_reward_value_command:
        - "<gray>Enter the command to run (Use <green>%player% <gray>for player name)."
        - "<gray>Example: <white>eco give %player% 1000"
      edit_reward_chance:
        - "<gray>Enter the drop percentage for this reward (0-100)."
        - "<gray>Example: <white>50.5"
      edit_reward_name:
        - "<gray>Enter the display name or reward message."
        - "<gray>Colors supported. Example: <green><bold>Super Sword"
      edit_tier:
        - "<gray>Enter Time (seconds) and Chest amount, separated by a space."
        - "<gray>Example: <green>300 3 <gray>(Complete under 300s = 3 chests)"
      edit_kick_delay:
        - "<gray>Enter the Delay in Seconds before kicking players out upon win."
        - "<gray>Example: <green>15"
      edit_action_mob:
        - "<gray>Enter the monster name (MythicMobs Internal Name or Vanilla EntityType)."
        - "<gray>MythicMobs Example: <green>SkeletonKing"
        - "<gray>Vanilla Example: <green>ZOMBIE"
