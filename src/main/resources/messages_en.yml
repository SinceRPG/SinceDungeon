        - "<gray>Example: <green>dungeon_map_1"
      edit_world_name:
        - "<gray>Enter the template World folder name."
        - "<gray>Example: <green>Dungeon_Map_01"
      edit_condition_check:
        - "<gray>Enter PAPI condition format: <white>%placeholder%;operator;value"
        - "<gray>Supported operators: <white>>=, <=, >, <, ==, !="
        - "<gray>Example: <green>%vault_eco_balance%;>=;500"
      edit_condition_msg:
        - "<gray>Enter the message shown when requirement is not met."
        - "<gray>Example: <red>You need $500 to enter!"
