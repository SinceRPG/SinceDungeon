# Main Configuration for SinceDungeon

settings:
  # Cài đặt ngôn ngữ (vd: vi, en). Plugin sẽ tự động tải messages_<locale>.yml
  locale: "vi"

# Debug mode: Bật lên để xem log chi tiết khi gặp lỗi
debug: false

dungeon:
  # Thời gian đếm ngược (giây) trước khi bắt đầu dungeon
  lobby-countdown: 10
  # Thư mục chứa các map mẫu (nằm trong thư mục gốc của server)
  template-folder: "dungeons"
  # Tiền tố tên thế giới khi tạo dungeon
  world-prefix: "SinceDungeon_"

editor:
  # Item dùng để điều hướng trong Editor GUI
  nav-item: ARROW

# Cấu hình âm thanh cho toàn bộ plugin
sounds:
  lobby_countdown: "block.note_block.pling"
  game_start: "entity.ender_dragon.growl"
  stage_start: "block.note_block.chime"
  stage_complete: "entity.player.levelup"
  editor_click: "ui.button.click"
  editor_save: "block.anvil.use"
  reward_reveal: "entity.player.levelup"
  reward_claim: "entity.item.pickup"

# Cấu hình giá trị mặc định khi tạo Action mới
action-defaults:
  spawn_wave:
    mob: "ZOMBIE"
    amount: 1
  reach_location:
    radius: 3.0
  mythic_wave:
    mob: "SkeletonKing"
    amount: 1