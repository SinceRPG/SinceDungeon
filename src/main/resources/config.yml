# =========================================================
# [CROSS-SERVER CONFIGURATION]
# ⚠️ EXPERIMENTAL FEATURE (v1.5.5+) - USE AT YOUR OWN RISK! ⚠️
# This feature is largely untested in production environments.
# Please proceed with caution and consider the risks before enabling.
# The plugin author has no personal experience in setting up or using
# this Redis/BungeeCord infrastructure, so support for this specific
# feature will be strictly limited or completely unavailable.
# =========================================================
cross-server:
  # Set to true to enable cross-server dungeon matchmaking
  enabled: false

  # Time in seconds to wait for BungeeCord to transfer the player before cancelling the request
  transfer-timeout-seconds: 30

  # The exact name of THIS specific server as defined in your proxy config (e.g., BungeeCord's config.yml)
  # When a dungeon is created here, players will be sent to this server name.
  server-name: "dungeon-node-1"

  # The plugin messaging channel used to send players across servers.
  # Usually "BungeeCord" for BungeeCord/Waterfall or "velocity:main" for Velocity.
  bungee-channel: "BungeeCord"
  # The Lobby server name is used to send players back after completing a Dungeon.
  return-server: "lobby"

# =========================================================
# [REDIS CONFIGURATION]
# Required if cross-server is enabled. Used for inter-server communication.
# =========================================================
redis:
  host: "localhost"
  port: 6379
  password: ""

  # The Pub/Sub channel name used by SinceDungeon to communicate.
  # All servers in the network must share the exact same channel name.
  channel: "SinceDungeon"

# =========================================================
# [DATABASE CONFIGURATION]
# Configure the database backend for leaderboard storage.
# type: "sqlite" (local file, recommended for small servers)
#       "mysql"  (remote database, recommended for large/multi-server setups)
# =========================================================
database:
  type: "sqlite"
  host: "localhost"
  port: 3306
  database: "sincedungeon"
  username: "root"
  password: ""

  # ==================================
  # HIKARICP CONNECTION POOL SETTINGS
  # Optimized for MySQL performance. Defaults are fine for most servers.
  # Cấu hình tối ưu hóa kết nối cơ sở dữ liệu. Mặc định là ổn cho hầu hết server.
  # ==================================
  pool:
    # Maximum number of concurrent connections to the database. (Recommended: 10 - 20)
    # Số lượng kết nối tối đa được mở cùng lúc tới MySQL. Tránh nghẽn khi nhiều người chơi cùng lúc. (Khuyên dùng: 10 - 20)
    max-size: 10

    # Minimum number of idle connections maintained in the pool. (Recommended: 2 - 5)
    # Số lượng kết nối nhàn rỗi (chờ sẵn) luôn được duy trì để phản hồi ngay lập tức. (Khuyên dùng: 2 - 5)
    min-idle: 2

    # Maximum lifetime of a connection in milliseconds (1800000ms = 30 minutes). Prevents database disconnects.
    # Thời gian sống tối đa của một kết nối tính bằng mili-giây (1800000 = 30 phút). Tránh lỗi MySQL tự ngắt kết nối.
    max-lifetime: 1800000

    # Maximum time to wait for a connection from the pool in milliseconds (5000ms = 5 seconds).
    # Thời gian chờ tối đa để lấy một kết nối tính bằng mili-giây (5000 = 5 giây).
    timeout: 5000

# =========================================================
# [COMMANDS CONFIGURATION]
# Defines the main commands used by the plugin.
# Change these if you have conflicts with other plugins (e.g. MMOCore's /party).
# =========================================================
commands:
  party: "party"
  party-aliases:
    - "p"
    - "pt"
  dungeon: "dungeon"
  dungeon-aliases:
    - "dg"
    - "inst"
  admin: "sincedungeon"
  admin-aliases:
    - "sd"
    - "sdungeon"
# =========================================================
# [REWARD CONFIGURATION]
# =========================================================
reward:
  # Time in seconds before an unopened reward session expires and auto-claims (Default: 300 = 5 minutes)
  session-expire-seconds: 300


# =========================================================
# [LEADERBOARD CONFIGURATION]
# =========================================================
leaderboard:
  # Maximum number of records retrieved from the database (Limited to prevent lag)
  fetch-limit: 50
  gui-size: 54
  items:
    rank_1: GOLD_BLOCK
    rank_2: IRON_BLOCK
    rank_3: COPPER_BLOCK
    rank_other: COAL_BLOCK
    category_time: CLOCK
    category_kills: DIAMOND_SWORD
    category_clears: NETHER_STAR

# =========================================================
# [LIVES SYSTEM CONFIGURATION]
# =========================================================
lives:
  # Default maximum lives for a new player.
  default-max-lives: 3

  # Default starting lives for a new player.
  default-start-lives: 3

  # Regeneration interval in seconds (e.g., 3600 = 1 hour per life).
  regen-interval-seconds: 3600

  # How many lives to restore per interval.
  regen-amount: 1

  # ==================================
  # LIFE ITEM CREATOR
  # Advanced 1.21+ Item Configuration
  # ==================================
  life-item:
    # The base material of the item.
    material: "NETHER_STAR"

    # Display name of the item. <amount> is dynamically replaced by the command.
    name: "&d&l✦ Soul Crystal ✦ &8| &a+<amount> Lives"

    # The lore (description) of the item.
    lore:
      - "&8&m━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - "&7A mythical crystal pulsating with"
      - "&7ancient life force. Consume it to"
      - "&7restore your soul from the abyss."
      - ""
      - "&fRestores: &a<amount> &fLives"
      - ""
      - "&e&lRIGHT-CLICK &7to consume!"
      - "&8&m━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    # Sets the official Vanilla item rarity color (COMMON, UNCOMMON, RARE, EPIC).
    rarity: "EPIC"

    # Makes the item glow like an enchanted item.
    glowing: true

    # Makes the item completely unbreakable.
    unbreakable: true

    # Overrides the maximum stack size (1.21+ feature).
    max-stack-size: 99

    # Hides default vanilla tooltips to keep the item looking clean.
    flags:
      - "HIDE_ENCHANTS"
      - "HIDE_ATTRIBUTES"
      - "HIDE_UNBREAKABLE"

    # (Optional) Apply vanilla attributes for extra flavor when holding the item.
    # Operations: ADD_NUMBER, ADD_SCALAR, MULTIPLY_SCALAR_1
    # Slots: ANY, MAIN_HAND, OFF_HAND, HEAD, CHEST, LEGS, FEET
    #    attributes:
    #      max_health:
    #        amount: 4.0
    #        operation: "ADD_NUMBER"
    #        slot: "OFF_HAND"
    #      luck:
    #        amount: 1.0
    #        operation: "ADD_NUMBER"
    #        slot: "ANY"

    # (Optional) Custom Model Data for Resource Packs.
    # Supports legacy integer format or advanced 1.21+ component formats.
    custom-model-data:
      value: 1001
      # floats: [1.0]
      # strings: ["custom_texture_id"]
      # colors: ["#FF55FF"]

    # ==================================
    # EFFECTS ON CONSUME
    # Plays when the player successfully uses the item
    # ==================================
    consume-sound:
      enabled: true
      # You can use Bukkit Sound ENUM or minecraft: namespace
      sound: "entity.player.levelup"
      volume: 1.0
      pitch: 0.5

    consume-particle:
      enabled: true
      # Particle ENUM (e.g., TOTEM_OF_UNDYING, SOUL_FIRE_FLAME, END_ROD)
      particle: "TOTEM_OF_UNDYING"
      amount: 40
      offset-x: 0.5
      offset-y: 1.0
      offset-z: 0.5
      speed: 0.15

settings:
  # Language setting (e.g., vi, en). The plugin will automatically load messages_<locale>.yml
  # Cài đặt ngôn ngữ (vd: vi, en). Plugin sẽ tự động tải file messages_<locale>.yml
  locale: "en"

  # Debug mode: Enable to view detailed logs when an error occurs
  # Chế độ gỡ lỗi: Bật để xem log chi tiết khi xảy ra sự cố
  debug: false

party:
  # Maximum members allowed in a single party
  # Số lượng thành viên tối đa trong một nhóm
  max-members: 4

  # Allow party members to damage each other inside dungeons?
  # Cho phép các thành viên trong nhóm đánh lẫn nhau trong dungeon không?
  allow-friendly-fire: false

  # Maximum block distance for party members to be pulled into a dungeon together (0 = map-wide)
  # Khoảng cách tối đa để các thành viên được kéo vào dungeon cùng nhau (0 = toàn bản đồ)
  max-join-distance: 50.0

  # Reward sharing mode: EQUAL (all get the same), LEADER_ONLY (only leader gets chests)
  # Chế độ chia thưởng: EQUAL (tất cả nhận bằng nhau), LEADER_ONLY (chỉ trưởng nhóm nhận rương)
  reward-share-mode: "EQUAL"

  # The display name of the system when sending automated party broadcasts
  # Tên hiển thị của hệ thống khi gửi thông báo tự động cho nhóm
  system-name: "Hệ thống"

  # Time in seconds before a party invite expires
  # Thời gian tính bằng giây trước khi lời mời vào nhóm hết hạn
  invite-timeout: 60

dungeon:
  # Countdown time (in seconds) before the dungeon starts
  # Thời gian đếm ngược (bằng giây) trước khi dungeon bắt đầu
  lobby-countdown: 10

  # Folder containing template maps (located in the server's root plugin directory)
  # Thư mục chứa các map mẫu (nằm trong thư mục plugin của server)
  template-folder: "dungeons"

  # World name prefix when generating a dungeon instance
  # Tiền tố tên thế giới khi tạo bản sao dungeon
  world-prefix: "SinceDungeon_"

  # Hành động khi có người chơi chết trong Dungeon:
  # RESPAWN: Hồi sinh tại điểm xuất phát của Dungeon và chơi tiếp.
  # FAIL: Cả nhóm thất bại và bị đưa về sảnh ngay lập tức.
  death-action: "RESPAWN"

  # Who receives a top (leaderboard) entry for Fastest Time and Most Clears when a dungeon is completed?
  # ALL_MEMBERS: All party members who completed the dungeon get credit.
  # LEADER_ONLY: Only the party leader gets credit for time and clear count.
  # Note: Kills are ALWAYS tracked individually regardless of this setting.
  top-awarded-to: "ALL_MEMBERS"

  # Xóa vật phẩm và kinh nghiệm (EXP) mặc định rơi ra từ quái vật trong Dungeon?
  # Clear default mob drops and EXP (like rotten flesh, bones, vanilla exp) inside the dungeon?
  # Bật (true) để ngăn người chơi farm rác/exp. Tắt (false) nếu bạn muốn giữ lại hệ thống rơi đồ mặc định.
  clear-mob-drops: true

  # Có lưu lại thông số (máu, độ đói, hiệu ứng...) của người chơi trước khi vào và trả lại khi ra không?
  # Nếu tắt (false), người chơi sẽ giữ nguyên trạng thái hiện tại khi vào và ra Dungeon.
  # Save and restore player stats (health, food, effects...) before entering and after leaving?
  # If false, players will keep their current stats when entering and leaving.
  save-and-restore-stats: false

  # Actions when a player LOSES A LIVE in a Dungeon:
  # SPECTATE: Become a spectator and watch your teammates continue fighting.
  # KICK: Be immediately kicked out of the Dungeon.
  # FAIL: Cause the entire team to fail immediately.
  out-of-lives-action: "SPECTATE"

  # Các Tùy chọn Gameplay trong lúc đánh Dungeon
  gameplay:
    # Có giữ lại túi đồ và cấp độ khi người chơi chết trong Dungeon không?
    # Keep inventory and EXP when a player dies inside the dungeon?
    keep-inventory-on-death: true

    # Có cấm vứt vật phẩm (Drop Item) trong Dungeon không? (Chống thất thoát đồ)
    # Prevent players from dropping items inside the dungeon?
    prevent-item-dropping: true

    # Có cấm sử dụng Ngọc Ender (Ender Pearl) và Quả Chorus để chống bug xuyên tường không?
    # Block Ender Pearls and Chorus Fruit teleportation inside the dungeon?
    block-ender-pearls: true

    # Thời gian (tính bằng giây) cho phép người chơi nán lại Dungeon sau khi chiến thắng trước khi bị đưa về.
    # Delay in seconds before kicking players out of the dungeon after they win.
    kick-delay-after-finish: 10

    # =========================================================
    # KICK COUNTDOWN DISPLAY
    # Configure how the countdown is displayed to the players.
    # Supported types: ACTIONBAR, TITLE, CHAT, NONE
    # =========================================================
    kick-countdown:
      display-type: "ACTIONBAR"

    # Tự động ép thời gian thành Buổi Sáng (Trưa) và Tạnh Mưa khi tạo Dungeon?
    # Nếu tắt (false), Dungeon sẽ giữ nguyên thời gian và thời tiết từ Map mẫu của bạn.
    # Force daylight (6000 ticks) and clear weather when a dungeon is generated?
    force-daylight-and-clear-weather: true

    # Cấm sử dụng lệnh để chống gian lận (VD: /fly, /heal, /sethome)
    # Block commands inside dungeons to prevent cheating?
    block-commands: true

    # Shuffle the middle stages (Rogue-like mode). First and last stages will remain locked.
    randomize-stages: false

    # Danh sách các lệnh ĐƯỢC PHÉP dùng (Nhớ ghi chữ thường)
    # List of allowed commands inside dungeons.
    allowed-commands:
      - "/party"
      - "/p"
      - "/dungeon"
      - "/sincedungeon"

editor:
  # Item used for navigation in the Editor GUI
  # Vật phẩm dùng để điều hướng trong GUI Editor
  nav-item: ARROW
  limits:
    max-locations: 50
    max-mob-amount: 200
    max-radius: 100.0

# Sound configuration for the entire plugin / Cấu hình âm thanh cho toàn bộ plugin
sounds:
  door_locked: "block.chest.locked"
  door_unlock: "block.iron_door.open"
  compass_receive: "entity.item.pickup"
  lobby_countdown: "block.note_block.pling"
  game_start: "entity.ender_dragon.growl"
  stage_start: "block.note_block.chime"
  stage_complete: "entity.player.levelup"
  editor_click: "ui.button.click"
  editor_save: "block.anvil.use"
  reward_reveal: "entity.player.levelup"
  reward_claim: "entity.item.pickup"
  wall_break: "entity.generic.explode"
  mob_spawn: "entity.zombie.break_wooden_door"

particles:
  zone_border: "FLAME"
  zone_complete: "TOTEM_OF_UNDYING"
  wall_break: "EXPLOSION"
  wall_crumble: "BLOCK_CRUMBLE"
  reach_location_idle: "HAPPY_VILLAGER"
  reach_location_complete: "TOTEM_OF_UNDYING"
  mob_spawn: "CAMPFIRE_COSY_SMOKE"

titles:
  # The duration of Title animations displayed in milliseconds (1000ms = 1 second)
  fade-in: 200
  stay: 3000
  fade-out: 500

dungeon-items:
  key:
    material: "TRIPWIRE_HOOK"
    name: "&6&lDungeon Key &7(#<id>)"
    lore:
      - "&8&m━━━━━━━━━━━━━━━━━━━━"
      - "&7A mysterious key used to"
      - "&7unlock a sealed door."
      - ""
      - "&eFind the matching door!"
      - "&8&m━━━━━━━━━━━━━━━━━━━━"
    glowing: true
  compass:
    material: "COMPASS"
    name: "&b&lTracking Compass"
    lore:
      - "&8&m━━━━━━━━━━━━━━━━━━━━"
      - "&7Follow the compass needle"
      - "&7to find your objective."
      - "&8&m━━━━━━━━━━━━━━━━━━━━"
    glowing: true

# Default values configuration when creating a new Action in the editor
# Cấu hình giá trị mặc định khi tạo Action mới trong Editor
action-defaults:
  spawn_wave:
    mob: "ZOMBIE"
    amount: 1
    scale_with_party: false
    time_limit: -1
    time_penalty: 1
    custom_name: ""
    is_baby: false
    attributes: [ ]
    equipment: [ ]
    locations:
      - "0,0,0"
    start_message:
      - "&cMonsters are approaching!"
  reach_location:
    radius: 3.0
    time_limit: -1
    time_penalty: 1
    start_message:
      - "&eMove to the next checkpoint!"
  mythic_wave:
    mob: "SkeletonKing"
    amount: 1
    scale_with_party: false
    level: 1
    time_limit: -1
    time_penalty: 1
    locations:
      - "0,0,0"
    start_message:
      - "&4A massive aura appears. The Boss has arrived!"

  # ========================================================
  # [HOW TO ADD A DOOR KEY TO THIS CHEST?]
  # To make this chest drop a Key for the "Unlock Door" action,
  # you must configure the 'items' section manually in your map's YAML file.
  #
  # Syntax Format:
  # <Slot_Number>: "<Item_Type>:<ID>:<Amount>"
  #
  # Examples:
  # items:
  #   13: "KEY:door_1:1"               # Spawns 1 Key to open 'door_1'
  #   14: "MMOITEMS:SWORD:FROST:1"     # Spawns 1 MMOItem
  #   15: "DIAMOND:10"                 # Spawns 10 Vanilla Diamonds
  # ========================================================
  loot_chest:
    time_limit: -1
    time_penalty: 1
    items: { }
    start_message:
      - "&6A supply chest has appeared, loot it!"
  break_wall:
    time_limit: -1
    time_penalty: 1
    start_message:
      - "&bDestroy the seal to open the path!"
  random_wave:
    amount: 5
    scale_with_party: false
    time_limit: -1
    time_penalty: 1
    # Each entry format: VANILLA:<EntityType>:<weight>  or  MYTHIC:<MobId>:<weight>[:<level>]
    # Weight controls how often each mob is picked (higher = more likely). Does NOT need to sum to 100.
    random_mobs:
      - "VANILLA:ZOMBIE:50"
      - "VANILLA:SKELETON:30"
      - "MYTHIC:SkeletonKing:20:1"
    start_message:
      - "&cA horde of mixed enemies appears!"
  control_zone:
    center: "0,0,0"
    start_radius: 10.0
    end_radius: 3.0
    required_time: 20
    time_limit: -1
    time_penalty: 1
    mob_type: "NONE"
    mob_interval: 60
    start_message:
      - "&eCapture and hold the zone!"
  unlock_door:
    trigger: "0,0,0"
    corner1: "0,0,0"
    corner2: "0,0,0"
    time_limit: -1
    time_penalty: 1
    key_id: "door_1"
    particle: "ENCHANT"
    start_message:
      - "&eYou found a Key! Follow your compass to unlock the path forward."

# =========================================================
# [TÙY CHỈNH THÔNG BÁO]
# [CUSTOMIZE NOTIFICATIONS]
# Bật/tắt chi tiết các thông báo gửi lên kênh chat cho từng hành động
# Enable/disable detailed notifications sent to the chat channel for each action.
# =========================================================
action-notifications:
  spawn_wave:
    custom_start: true # Dòng start_message tùy chỉnh trong file map / The custom start_message line in the map file
    init: true         # Thông báo hệ thống khi quái được spawn / System notification when monsters spawn.
    progress: true     # Thông báo nhắc nhở số lượng quái còn lại / Notification showing the remaining number of monsters.
    complete: true     # Thông báo khi quái bị tiêu diệt hết / Notification when all monsters are eliminated.
  mythic_wave:
    custom_start: true
    init: true
    progress: true
    complete: true
  loot_chest:
    custom_start: true
    init: true         # Thông báo khi rương xuất hiện / Notification when the chest appears
    progress: true     # Thông báo khi có người vừa chạm vào rương / Receive a notification when someone touches the chest.
    warning: true      # Thông báo cảnh báo khi đóng rương mà chưa lấy hết đồ / Warning message appears when closing a chest without removing all items.
    complete: true     # Thông báo khi rương đã được thu thập sạch / Notification when all chests have been collected.
  reach_location:
    custom_start: true
    init: true         # Báo hiệu tọa độ mục tiêu cần đi đến / Signals the coordinates of the target to be reached.
    complete: true     # Báo hiệu đã đến nơi thành công / Signal indicating successful arrival.
  break_wall:
    custom_start: true
    complete: true     # Notification when the sealing wall is broken
  random_wave:
    custom_start: true
    init: true         # Notification when the random wave spawns.
    progress: true     # Notification showing the remaining enemy count.
    complete: true     # Notification when all enemies are eliminated.
  control_zone:
    custom_start: true
    init: true
    warning: true      # Notification when not enough players are standing inside the zone
    complete: true
  unlock_door:
    custom_start: true
    init: true
    complete: true