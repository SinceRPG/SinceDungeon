# Template World folder name (Will be cloned by the system for each new party)
template-world: "world"

# Open status: true (Everyone can enter), false (Only Admins can enter)
public: true

# =========================================================
# [CUSTOM GAMEPLAY SETTINGS FOR THIS MAP]
# =========================================================
settings:
  keep-inventory-on-death: true
  prevent-item-dropping: true
  block-ender-pearls: true
  kick-delay-after-finish: 15
  force-daylight-and-clear-weather: true
  save-and-restore-stats: false
  death-action: RESPAWN # Can be changed to "FAIL" (Death means party fails)
  clear-mob-drops: true
  block-commands: true
  allowed-commands:
    - /party
    - /p
    - /dungeon
    - /sincedungeon

# =========================================================
# [ENTRY CONDITIONS]
# Check Format: %placeholder%;<operator>;<value>
# Supported operators: >=, <=, >, <, ==, !=
# =========================================================
conditions:
  req_money:
    name: "Money Requirement"
    check: "%vault_eco_balance%;>=;1000"
    msg: "<red>You need at least <yellow>$1000 <red>to enter this dungeon!"
  req_level:
    name: "Level Requirement"
    check: "%player_level%;>=;10"
    msg: "<red>You must be at least level 10 to enter!"

# =========================================================
# [VICTORY REWARDS]
# Tiers: Time limit (seconds) -> Number of chests received
# =========================================================
rewards:
  tiers:
    '120': 5 # Complete under 2 minutes (120s) for 5 chests
    '240': 3 # Complete under 4 minutes (240s) for 3 chests
    '360': 1 # Complete under 6 minutes (360s) for 1 chest

  pool:
    reward_cash:
      type: COMMAND
      value: "eco give %player% 5000"
      chance: 40.0
      name: "<green><bold>$5000 Cash Bundle"
    reward_diamonds:
      type: ITEM
      value: "DIAMOND:16"
      chance: 30.0
      name: "<aqua>16x Diamonds"
    reward_mythic_sword:
      type: MMOITEM
      value: "SWORD:EPIC_SWORD:1" # Format: TYPE:ID:AMOUNT
      chance: 20.0
      name: "<red><bold>Legendary Holy Sword"
    reward_boss_key:
      type: COMMAND
      value: "give %player% tripwire_hook 1 name:&c&lBoss_Key"
      chance: 10.0
      name: "<red><bold>Mysterious Key"

# =========================================================
# [DUNGEON STAGES AND ACTIONS]
# Stages (1, 2, 3...) will run sequentially one after another.
# Actions within the same Stage will also run sequentially.
# =========================================================
stages:
  # ---------------------------------------------------------
  # STAGE 1: Clear basic monsters and proceed
  # ---------------------------------------------------------
  '1':
    actions:
      action_1_spawn_mobs:
        type: SPAWN_WAVE
        mob: ZOMBIE
        amount: 5
        locations:
          - "10.5, 65, 15.5"
          - "12.5, 65, 15.5"
          - "15.5, 65, 12.5"
        start_message:
          - "<red>⚠ ALERT: A horde of Zombies is blocking the way!"
          - "<yellow>Eliminate all of them to proceed."

      action_2_reach_checkpoint:
        type: REACH_LOCATION
        radius: 3.5
        target: "25.0, 65, 25.0"
        start_message:
          - "<aqua>Excellent! Proceed to the Magic Circle ahead."

  # ---------------------------------------------------------
  # STAGE 2: Loot the chest & Break the wall
  # ---------------------------------------------------------
  '2':
    actions:
      action_1_loot_chest:
        type: LOOT_CHEST
        location: "28.0, 65, 28.0"
        items:
          '13': "GOLDEN_APPLE:2" # Slot 13
          '14': "IRON_SWORD:1"   # Slot 14
          '15': "MMOITEMS:SWORD:SILVER_BLADE:1" # MMOItems format: MMOITEMS:TYPE:ID:AMOUNT (Slot 15)
        start_message:
          - "<gold>✦ TREASURE: <gray>A supply chest has appeared in the corner!"
          - "<gray>Take all the items inside to continue."

      action_2_break_barrier:
        type: BREAK_WALL
        corner1: "30, 65, 30" # Coordinate of corner 1 of the wall
        corner2: "35, 68, 30" # Coordinate of corner 2 of the wall
        trigger: "32, 66, 30" # Coordinate of the sealing block (Player must click/break it)
        start_message:
          - "<red>The path is blocked. Find and break the Sealing Stone (Trigger)!"

  # ---------------------------------------------------------
  # STAGE 3: Final Boss (MythicMobs Boss)
  # ---------------------------------------------------------
  '3':
    actions:
      action_1_boss_fight:
        type: MYTHIC_WAVE
        mob: "SkeletonKing" # Internal Name in MythicMobs
        amount: 1
        level: 5
        locations:
          - "50.5, 65, 50.5"
        start_message:
          - "<dark_red><bold>☠ THE FINAL BOSS HAS AWAKENED ☠"
          - "<red>The Skeleton King is enraged... There is no turning back!"